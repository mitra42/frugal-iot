board = lilygo-t3-s3 ; defines ARDUINO_LILYGO_T3_S3_V1_X
board_build.variant = lilygo_t3_s3_sx127x
build_flags = 
    ${common.build_flags}
    '-D SYSTEM_OTA_SUFFIX="lilygo_t3_s3_sx127x"'
    ${common.build_flags_loramesher}
board_build.partitions = min_spiffs.csv ; Need min_spiffs.csv as SSD and GFX push it over the size
lib_deps = 
    ${common.lib_deps_lora_oled}

[env:lilygo_t3_s3_sx127x_sht]
platform = ${common.platform_esp32}
board = lilygo-t3-s3 ; defines ARDUINO_LILYGO_T3_S3_V1_X
board_build.variant = lilygo_t3_s3_sx127x
build_flags = 
    ${common.build_flags}
    '-D SYSTEM_OTA_SUFFIX="lilygo_t3_s3_sx127x_sht"'
    -D SENSOR_SHT_WANT ; I2C Sensor
    ${common.build_flags_loramesher}
board_build.partitions = min_spiffs.csv ; Need min_spiffs.csv as SSD and GFX push it over the size
lib_deps = 
    ${common.lib_deps_lora_oled}

[env:heltec_wifi_lora_32_V3]
platform = ${common.platform_esp32}
board = heltec_wifi_lora_32_V3  ; there are not yet separate board and variant files for V3
build_flags = 
    ${common.build_flags}
    '-D SYSTEM_OTA_SUFFIX="heltec_wifi_lora_32_v3"'
    ${common.build_flags_loramesher}
; board_build.partitions = min_spiffs.csv ; heltec_wifi_lora_32_v3 default of default_8MB.csv is fine (3.3Mb apps)
lib_deps = 
    ${common.lib_deps_lora_oled}

[env:heltec_wifi_lora_32_V32] ; Substantial differences in power handling from V3
platform = ${common.platform_esp32}
board = heltec_wifi_lora_32_V3  ; defines ARDUINO_heltec_wifi_lora_32_V3; default variant heltec_wifi_lora_32_V3
build_flags = 
    ${common.build_flags}
    -D ARDUINO_heltec_wifi_lora_32_V32 ; If using 3.2 board uncomment this
    '-D SYSTEM_OTA_SUFFIX="heltec_wifi_lora_32_v32"'
    ${common.build_flags_loramesher}
; board_build.partitions = min_spiffs.csv ; heltec_wifi_lora_32_v3 default of default_8MB.csv is fine (3.3Mb apps)
lib_deps = 
    ${common.lib_deps_lora_oled}

[env:tbeam]
platform = ${common.platform_esp32}
board = ttgo-t-beam ; defines ARDUINO_T_Beam
build_flags =
    ${common.build_flags}
    '-D SYSTEM_OTA_SUFFIX="ttgo-t-beam"'
    ${common.build_flags_loramesher}
 oard_build.partitions = min_spiffs.csv ; Need min_spiffs.csv as SSD and GFX push it over the size
lib_deps =
    ${common.lib_deps_lora}

[env:tbeam_oled]
platform = ${common.platform_esp32}
board = ttgo-t-beam ; defines ARDUINO_T_Beam
build_flags =
    ${common.build_flags}
    ; OLED is an add on for tbeams
    -D OLED_SDA=21
    -D OLED_SCL=22
    '-D SYSTEM_OTA_SUFFIX="ttgo-t-beam-oled"'
    ${common.build_flags_loramesher}
board_build.partitions = min_spiffs.csv ; Need min_spiffs.csv as SSD and GFX push it over the size
lib_deps =
    ${common.lib_deps_lora_oled}

; ===== Heltec WiFi LoRa 32 V4 (ESP32-S3) ===================================
; No official heltec_wifi_lora_32_V4 board definition ships with the pioarduino
; platform (2026-06), so we supply project-local files:
;   boards/heltec_wifi_lora_32_V4.json  — board JSON (auto-discovered by PlatformIO)
;   variants/heltec_V4/pins_arduino.h   — pin definitions
; When an official definition ships, remove board_build.variants_dir/variant and
; delete the boards/ and variants/ project directories.
[env:heltec_wifi_lora_32_V4]
platform = ${common.platform_esp32}
board = heltec_wifi_lora_32_V4    ; defined in boards/heltec_wifi_lora_32_V4.json
board_build.variants_dir = variants
board_build.variant = heltec_V4   ; matches variants/heltec_V4/pins_arduino.h
build_flags =
    ${common.build_flags}
    ${common.build_flags_loramesher}
    '-D SYSTEM_OTA_SUFFIX="heltec_wifi_lora_32_v4"'
    ; GNSS UART pins — NOTE: V4 uses different GPIOs than what early docs suggested.
    ; These come from Heltec's own example code (Debug_GNSS.cpp, GPSwithOLED.cpp):
    -D SENSOR_GPS_RX_PIN=39       ; ESP32-S3 UART RX ← GNSS module TX
    -D SENSOR_GPS_TX_PIN=38       ; ESP32-S3 UART TX → GNSS module RX
    -D SENSOR_GPS_0v_PIN=34   ; VGNSS_CTRL Passed as power0v_pin so Sensor::powerUp() drives it LOW
    -D SENSOR_GPS_WAKE_PIN=40 ; drive HIGH continuously to prevent module sleep:
    -D SENSOR_GPS_RST_PIN=42 ; ; GNSS_RST must be driven HIGH to release the module from hardware reset:
    -D SENSOR_GPS_DEBUG
lib_deps =
    ${common.lib_deps_lora_oled}

